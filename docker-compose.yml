services:
  mongodb:
    image: mongo:7.0
    container_name: tendertracker_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: tendertracker
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: tendertracker_pdf
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - SYSTEM_DEFAULT_LOCALE=en_US

volumes:
  mongo_data:
    driver: local
